# Pro version only
metadata:
#  license: "Apache 2.0"
  mod_timestamp: "{{ .CommitTimestamp }}"
#  maintainers:
#    - "Open Horizon <open-horizon@lists.lfedge.org>"


nfpms:
# Linux - Anax Agent
  -
    bindir: /usr/bin
    # conflicts:
    contents:
      ## contents - application static data
      -
        dst: /etc/horizon
        file_info:
          mode: 0700
          mtime: "{{.CommitDate}}"
        type: dir
      
      ## contents - systemd unit service
      -
        # TODO: rename horizon.service to anax.service
        dst: /usr/lib/system/horizon.service
        file_info:
          mode: 0644
          mtime: "{{.CommitDate}}"
        src: pkg/rpm/horizon/fs/lib/systemd/system/horizon.service
        type: config
      ## contents - general documentation
      - 
        dst: /usr/share/doc/anax
        file_info:
          mode: 0700
          mtime: "{{.CommitDate}}"
        type: dir
      -
        dst: /usr/share/doc/anax/
        file_info:
          mode: 0644
          mtime: "{{.CommitDate}}"
        src: docs/
      -
        dst: /usr/share/doc/anax/
        file_info:
          mode: 0644
          mtime: "{{.CommitDate}}"
        src: ./README.md
        type: file
      ## contents - copyright (debian)
      -
        dst: /usr/share/doc/anax/copyright
        file_info:
          mode: 0644
        packager: deb
        src: pkg/anax/debian/copyright
      ## contents - license
      - 
        dst: /usr/share/licenses/anax
        file_info:
          mode: 0700
          mtime: "{{.CommitDate}}"
        type: dir
      - 
        dst: /usr/share/licenses/anax/
        file_info:
          mode: 0644
          mtime: "{{.CommitDate}}"
        src: ./LICENSE.txt
        packager: rpm
        type: license
      - 
        dst: /usr/share/licenses/anax/
        file_info:
          mode: 0644
          mtime: "{{.CommitDate}}"
        src: ./LICENSE.txt
        type: file
      # contents - application dynamic data
      -
        dst: /var/run/horizon
        file_info:
          mode: 0700
          mtime: "{{.CommitDate}}"
        type: dir
      -
        dst: /var/horizon
        file_info:
          mode: 0700
          mtime: "{{.CommitDate}}"
        type: dir
    deb:
      fields:
        #Bugs: https://github.com/open-horizon/anax/issues
        Dgit: "${ .FullCommit }"
        Package-Type: deb
        Vcs-Broswer: https://github.com/open-horizon/anax
        Vcs-Git: https://github.com/open-horizon/anax.git
      predepends:
        - /bin/sh
      scripts:
        rules: pkg/anax/debian/rules
    dependencies:
      - /bin/sh
      - bash
      - docker-ce
      - horizon-common
      - iptables
      - jq
      - moby-engine
      - openssl
      - podman
    description: Open Horizon's client agent.
    homepage: https://open-horizon.github.io
    file_name_template: >-
      {{- trimsuffix .ConventionalFileName .ConventionalExtension -}}
      {{- if and (eq .Arm "6") (eq .ConventionalExtension ".deb") }}6{{ end -}}
      {{- if not (eq .Amd64 "v1")}}{{ .Amd64 }}{{ end -}}
      {{- .ConventionalExtension -}}
    formats:
      #- archlinux
      - deb
      - rpm
    id: nfpms-anax-linux
    ids:
      - builds-anax-linux
    license: Apache 2.0
    maintainer: Open Horizon <open-horizon@lists.lfedge.org>
    mtime: "{{ .CommitDate }}"
    overrides:
      deb:
        dependencies:
          - bash, docker-ce (>= 28.1.0) | moby-engine (>= 28.5.1) | podman (>= 5.4.0), /bin/sh, iptables, jq, openssl, systemd
      rpm:
        dependencies:
          - bash, (docker-ce >= 28.1.0 or moby-engine >= 28.5.1 or podman >= 5.4.0), /bin/sh, iptables, jq, openssl, systemd
    package_name: anax
    priority: standard
    provides:
      - anax
    recommends:
      - hzn
    # replaces:
    rpm:
      compression: lzma
      packager: Open Horizon <open-horizon@lists.lfedge.org>
      prefixes:
        - /usr/bin
      summary: Open Horizon's client agent
    scripts:
      postinstall: pkg/anax/debian/postinst
      preremove: pkg/anax/debian/prerm
      postremove: pkg/anax/debian/postrm
    section: net
    # suggests:
    umask: 0o002
    vendor: Open Horizon
# Linux - Horizon CLI
  -
    bindir: /usr/bin
    # conflicts:
    contents:
      ## contents - application static data
      -
        dst: /etc/horizon
        file_info:
          mode: 0700
          mtime: "{{.CommitDate}}"
        type: dir
      ## contents - systemd unit service
      #-
        # TODO: rename horizon.service to anax.service
        #dst: /usr/lib/system/horizon.service
        #file_info:
          #mode: 0644
          #mtime: "{{.CommitDate}}"
        #src: pkg/rpm/horizon/fs/lib/systemd/system/horizon.service
        #type: config
      ## contents - bash completions
      -
        dst: /usr/share/bash-completion/completions/hzn
        file_info:
          mode: 0644
          mtime: "{{.CommitDate}}"
        src: cli/bash_completion/hzn_bash_autocomplete.sh
        type: file
      ## contents - general documentation
      -
        dst: /usr/share/doc/hzn
        file_info:
          mode: 0700
          mtime: "{{.CommitDate}}"
        type: dir
      -
        dst: /usr/share/doc/hzn/
        file_info:
          mode: 0644
          mtime: "{{.CommitDate}}"
        src: docs/
      -
        dst: /usr/share/doc/hzn/
        file_info:
          mode: 0644
          mtime: "{{.CommitDate}}"
        src: ./README.md
        type: file
      -
        dst: /usr/share/doc/hzn/samples/
        file_info:
          mode: 0700
          mtime: "{{.CommitDate}}"
        type: dir
      -
        dst: /usr/share/doc/hzn/samples/
        file_info:
          mode: 0644
          mtime: "{{.CommitDate}}"
        src: cli/samples/
      ## contents - copyright (debian)
      -
        dst: /usr/share/doc/hzn/copyright
        file_info:
          mode: 0644
        packager: deb
        src: pkg/hzn/debian/copyright
