# https://pkg.go.dev/cmd/go#hdr-Environment_variables
builds:
# Anax
## Android
# CGO support required
  # Multiple compilation errors
  -
    env:
     - CGO_ENABLED=1
    id: "builds-anax-android"
    go386:
      - sse2
    goamd64:
      - v1
      - v2
      - v3
      - v4
    goarch:
      - 386
      - amd64
      - arm
      - arm64
    goarm:
      - "6"
      - "7"
    goarm64:
      - "v8.0"
      - "v9.0"
    goos:
      - android
    mod_timestamp: "{{ .CommitTimestamp }}"
    skip: true
## Darwin
  - 
    env:
      - CGO_ENABLED=0
    id: "builds-anax-darwin"
    goamd64:
      - v1
      - v2
      - v3
      - v4
    goarch:
      - amd64
      - arm64
    goarm64:
      - "v9.0"
    goos:
      - darwin
    mod_timestamp: "{{ .CommitTimestamp }}"
    skip: false
## Linux
  - 
    env:
      - CGO_ENABLED=0
    id: "builds-anax-linux"
    go386:
      - sse2
    goamd64:
      - v1
      - v2
      - v3
      #- v4
    goarch:
      - 386
      - amd64
      - arm
      - arm64
      # - mips - boltdb has compilation errors
      # - mips64le - boltdb has compilation errors
      - ppc64le
      # - riscv64 - boltdb has compilation errors
      - s390x
    goarm:
      - "6"
      - "7"
    goarm64:
      - "v9.0"
    goos:
      - linux
    goppc64:
      - power8
    mod_timestamp: "{{ .CommitTimestamp }}"
## Linux - ppc64le - Power 9
### the archiever tool is not picking-up versions of power correctly. This is a workaround.
  -
    env:
      - CGO_ENABLED=0
    id: "builds-anax-linux-power9"
    goarch:
      - ppc64le
    goos:
      - linux
    goppc64:
      - power9
    mod_timestamp: "{{ .CommitTimestamp }}"
    skip: true
## Linux - ppc64le - Power 10
### the archiever tool is not picking-up versions of power correctly. This is a workaround.
  - 
    env:
      - CGO_ENABLED=0
    id: "builds-anax-linux-power10"
    goarch:
      - ppc64le
    goos:
      - linux
    goppc64:
      - power10
    mod_timestamp: "{{ .CommitTimestamp }}"
    skip: true
## wasi
  -
    env:                           # Multiple compliation errors
      - CGO_ENABLED=0
    id: "builds-anax-wasip1"
    goarch:
      - wasm
    goos:
      - wasip1
    mod_timestamp: "{{ .CommitTimestamp }}"
    skip: true
## Windows
  -
    env:
      - CGO_ENABLED=0
    id: "builds-anax-windows"
    go386:
      - sse2
    goamd64:
      - v1
    goarch:
      - 386
      - amd64
      - arm64
    goarm64:
      - "v8.0"
      - "v9.0"
    goos:
      - windows
    mod_timestamp: "{{ .CommitTimestamp }}"
    skip: true
## FreeBSD
  - 
    env:
      - CGO_ENABLED=0
    id: "builds-anax-freebsd"
    go386:
      - sse2
    goamd64:
      - v1
      - v2
      - v3
      - v4
    goarch:
      - 386
      - amd64
      - arm
      - arm64
    goarm:
      - "6"
      - "7"
    goarm64:
      - "v9.0"
    goos:
      - freebsd
    mod_timestamp: "{{ .CommitTimestamp }}"

# Cloud Sync Service (CSS)
## Darwin
  -
    binary: cloud-sync-service
    dir: ./css
    env:
      - CGO_ENABLED=0
    id: "builds-css-darwin"
    goamd64:
      - v1
      - v2
      - v3
      - v4
    goarch:
      - amd64
      - arm64
    goarm64:
      - "v9.0"
    goos:
      - darwin
    main: ./cmd/cloud-sync-service/main.go
    mod_timestamp: "{{ .CommitTimestamp }}"
    skip: false
## Linux
