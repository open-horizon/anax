    skip: false
## Linux
  -
    binary: hzn
    dir: ./cli
    env:
      - CGO_ENABLED=0
    id: "builds-hzn-linux"
    go386:
      - sse2
    goamd64:
      - v1
      - v2
      - v3
      - v4
    goarch:
      - 386
      - amd64
      - arm
      - arm64
      # - mips - boltdb has compilation errors
      # - mips64le - boltdb has compilation errors
      - ppc64le
      # - riscv64 - boltdb has compilation errors
      - s390x
    goarm:
      - "6"
      - "7"
    goarm64:
      - "v9.0"
    goos:
      - linux
    goppc64:
      - power8
    main: ./hzn.go
    mod_timestamp: "{{ .CommitTimestamp }}"
    skip: false

