sboms:
  -
    artifacts: archive
    disable: false
    documents:
      - "${artifact}.spdx.json"
    cmd: syft
    id: sboms-anax-archive
  -
    artifacts: binary
    disable: false
    documents:
      - "${artifact}_{{ .Version }}-{{ .Os }}-.spdx{{- if eq .Arch \"386\" }}i386{{- else if eq .Arch \"amd64\" }}x86_64{{- else if eq .Arch \"arm64\" }}aarch64{{- else }}{{ .Arch }}{{ end }}{{- if not (eq .Amd64 \"v1\") }}{{ .Amd64 }}{{ end }}{{ with .Arm }}v{{ . }}{{ end }}{{ with .Arm64 }}{{ . }}{{ end }}{{ with .Ppc64 }}{{ . }}{{ end }}.spdx.json"
    cmd: syft
    id: sboms-anax-binary
  -
    artifacts: package
    disable: false
    documents:
      - "${artifact}.spdx.json"
    cmd: syft
    id: sboms-anax-package
  -
    artifacts: source
    disable: false
    documents:
      - "${artifact}.spdx.json"
    cmd: syft
    id: sboms-anax-source
  
snapshot:
  version_template: "{{ .Version }}"

source:
  enabled: true
  name_template: "{{ .ProjectName }}-{{ .Version }}"
  format: "tar.gz"


release:
  footer: >-

    ---

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).


report_sizes: true

# Bundled `fat` binary for Mac. amd64 & arm64 together.
universal_binaries:
  -
    id: universal-binaries-darwin-anax
    ids:
      - builds-anax-darwin
    mod_timestamp: "{{ .CommitTimestamp }}"
    name_template: "anax-{{ .Version }}-darwin-all"
    replace: true
  -
    id: universal-binaries-darwin-css
    ids:
      - builds-css-darwin
    mod_timestamp: "{{ .CommitTimestamp }}"
    name_template: "cloud-sync-service-{{ .Version }}-darwin-all"
    replace: true
  -
    id: universal-binaries-darwin-ess
    ids:
      - builds-ess-darwin
    mod_timestamp: "{{ .CommitTimestamp }}"
    name_template: "edge-sync-service-{{ .Version }}-darwin-all"
    replace: true
  -
    id: universal-binaries-darwin-hzn
    ids:
      - builds-hzn-darwin
    mod_timestamp: "{{ .CommitTimestamp }}"
    name_template: "hzn-{{ .Version }}-darwin-all"
    replace: true

# Binary compression. More, or less linux only.
upx:
  - brute: false
    compress: '7'
    enabled: true
    goarch:
      - 386
      - amd64
      - arm
      - arm64
      - ppc64le
    goos:
      - linux
    lzma: false
