# This is an example .goreleaser.yml file with some sensible defaults.
# Make sure to check the documentation at https://goreleaser.com

# The lines below are called `modelines`. See `:help modeline`
# Feel free to remove those if you don't want/need to use them.
# yaml-language-server: $schema=https://goreleaser.com/static/schema-pro.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

project_name: anax

env:
  - BASE_IMAGE_FROM_ALPINE={{ envOrDefault "BASE_IMAGE_FROM_ALPINE" "docker.io/alpine:latest" }}
  - BASE_IMAGE_FROM_UBI9={{ envOrDefault "BASE_IMAGE_FROM_UBI9" "registry.access.redhat.com/ubi9-minimal:latest" }}
  - BASE_IMAGE_FROM_UBI10={{ envOrDefault "BASE_IMAGE_FROM_UBI10" "registry.access.redhat.com/ubi10-minimal:latest" }}
  - DIGEST_ALPINE={{ envOrDefault "DIGEST_ALPINE" "" }}
  - DIGEST_UBI9={{ envOrDefault "DIGEST_UBI9" "" }}
  - DIGEST_UBI10={{ envOrDefault "DIGEST_UBI10" "" }}

before:
  hooks:
    # You may remove this if you don't use go modules.
    - go mod tidy
    # you may remove this if you don't need go generate
    #- go generate ./...
    - |
      bash -c "if [[ -z '$DIGEST_ALPINE' ]]; then export DIGEST_ALPINE=$(docker buildx imagetools inspect $BASE_IMAGE_FROM_ALPINE --format '{{ "{{" }} json . }}' | jq -r .manifest.digest); fi"
    - |
      bash -c "if [[ -z '$DIGEST_UBI9' ]]; then export DIGEST_UBI9=$(docker buildx imagetools inspect $BASE_IMAGE_FROM_UBI9 --format '{{ "{{" }} json . }}' | jq -r .manifest.digest); fi"
    - |
      bash -c "if [[ -z '$DIGEST_UBI10' ]]; then export DIGEST_UBI10=$(docker buildx imagetools inspect $BASE_IMAGE_FROM_UBI10 --format '{{ "{{" }} json . }}' | jq -r .manifest.digest); fi"


archives:
# Anax Agent & Agreement Bot
## Darwin
  - 
    formats: [tar.gz]
    # this name template makes the OS and Arch compatible with the results of `uname`.
    id: "archives-anax-darwin"
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Arch "ppc64le"}}{{ .Target }}
      {{- else}}{{ .Os }}_
      {{- if eq .Arch "386" }}i386
      {{- else if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}aarch64
      {{- else }}{{ .Arch }}{{ end }}
      {{- if not (eq .Amd64 "v1") }}{{ .Amd64 }}{{ end }}{{ with .Arm }}v{{ . }}{{ end }}{{ with .Arm64 }}{{ . }}{{ end }}{{ with .Ppc64 }}{{ . }}{{ end }}{{ end }}
    files:
      - src: 'LICENSE.txt'
        strip_parent: true
        info:
          owner: root
          group: root
          mtime: "{{ .CommitDate }}"
          mode: 0644
      - src: 'README.md'
        strip_parent: true
        info:
          owner: root
          group: root
          mtime: "{{ .CommitDate }}"
          mode: 0644
      - src: docs/*.md
        dst: docs
        info:
          owner: root
          group: root
          mtime: "{{ .CommitDate }}"
          mode: 0644
    ids: ["builds-anax-darwin"]
    builds_info:
      group: root
      owner: root
      mode: 0755
      # format is `time.RFC3339Nano`
      mtime: 2008-01-02T15:04:05Z
    allow_different_binary_count: false
