# Name of the workflow
name: E2E-test

# Workflow triggers -- When a pull request is made for the listed branches
on:
  workflow_dispatch:
  pull_request:
    branches:
      - master
      - v2.31
      - v2.30
      - v2.29

# Jobs executed when workflow is triggered
jobs:
  test:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Strategy allows specifying matrix axis(es) that will run for the test
    strategy:
      fail-fast: false
      matrix:
        tests: ["NOLOOP=1", "NOLOOP=1 TEST_PATTERNS=sall"]

    # Variables that are available to all steps in the job
    env:
      GOPATH: /home/runner/work/anax/anax/go
      DOCKER_CONFIG: /home/runner/.docker-config
      # Note: GitHub Actions automatically sets RUNNER_DEBUG=1 in the environment when
      # step debug logging is enabled (via ACTIONS_STEP_DEBUG=true repository secret).
      # Test scripts check RUNNER_DEBUG to enable set -x tracing and debug() output.

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
        with:
          path: go/src/github.com/${{github.repository}}
    
      # Prepares the environment by setting up golang
      # cache: true caches $GOPATH/pkg/mod keyed on go.sum for faster dependency resolution
      - name: Set up golang 1.24
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          check-latest: true
          cache: true
          cache-dependency-path: go/src/github.com/${{github.repository}}/go.sum

      # Cache the Go build cache (~/.cache/go-build) to speed up compilation of anax binaries.
      # The key includes the Go version and a hash of all Go source files so the cache is
      # invalidated whenever source code changes. The restore-key falls back to any prior
      # build cache for the same OS/Go version, allowing incremental reuse even on cache miss.
      - name: Cache Go build cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: go-build-${{ runner.os }}-go1.24-${{ hashFiles('**/*.go') }}
          restore-keys: |
            go-build-${{ runner.os }}-go1.24-

      # Create the custom DOCKER_CONFIG directory so Docker and hzn tools can find credentials.
      # Without this, hzn dev service start fails with "no such file or directory" when reading
      # config.json, producing invalid image tag format errors.
      - name: Create Docker config directory
        run: mkdir -p "${DOCKER_CONFIG}" && echo '{}' > "${DOCKER_CONFIG}/config.json"

      - name: Verify Docker version
        run: docker --version

      # Set up Docker Buildx to enable BuildKit and layer caching support
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build anax binaries
      - name: Build anax binaries
        run: cd ${GOPATH}/src/github.com/${GITHUB_REPOSITORY} && make

      # Cache the Docker registry image (pinned by digest - key is constant so always hits after first run)
      - name: Cache Docker registry image
        id: cache-registry-image
        uses: actions/cache@v4
        with:
          path: /tmp/registry-image.tar
          key: registry-image-${{ runner.os }}-sha256-7d081088e4bfd632a88e3f3bcd9e007ef44a796fddfe3261407a3f9f04abe1e7

      - name: Restore Docker registry image from cache
        if: steps.cache-registry-image.outputs.cache-hit == 'true'
        run: docker load -i /tmp/registry-image.tar

      - name: Pull and save Docker registry image to cache
        if: steps.cache-registry-image.outputs.cache-hit != 'true'
        run: |
          docker pull registry@sha256:7d081088e4bfd632a88e3f3bcd9e007ef44a796fddfe3261407a3f9f04abe1e7
          docker save registry@sha256:7d081088e4bfd632a88e3f3bcd9e007ef44a796fddfe3261407a3f9f04abe1e7 -o /tmp/registry-image.tar

      # Cache the e2edev service images built from test/docker/fs/ Dockerfiles.
      # These images (cpu, leaf, hello, usehello, helm/hello) are built at test runtime
      # by hzn_dev_services.sh via 'make ARCH=amd64' in each service directory.
      # Key is based on all service Dockerfiles so cache is invalidated on any change.
      - name: Cache e2edev service images
        id: cache-service-images
        uses: actions/cache@v4
        with:
          path: /tmp/e2edev-service-images.tar
          key: e2edev-service-images-${{ runner.os }}-${{ hashFiles('go/src/github.com/**/test/docker/fs/hzn/**', 'go/src/github.com/**/test/docker/fs/helm/**') }}
          restore-keys: |
            e2edev-service-images-${{ runner.os }}-

      - name: Restore e2edev service images from cache
        if: steps.cache-service-images.outputs.cache-hit == 'true'
        run: docker load -i /tmp/e2edev-service-images.tar

      - name: Verify Built Container Images
        run: docker images

      - name: E2E Development Test
        id: test-runner
        run: cd ${GOPATH}/src/github.com/open-horizon/anax && make -C test test-no-clean TEST_VARS=${{matrix.tests}}

      # Save service images built during the test run for future cache hits.
      # Images are tagged as localhost:443/amd64_*:1.0 and hello:1.0 by the service Makefiles.
      # continue-on-error so a partial test run (some images missing) does not block failure diagnostics.
      - name: Save e2edev service images to cache
        if: steps.cache-service-images.outputs.cache-hit != 'true'
        continue-on-error: true
        run: |
          images=$(docker images --format '{{.Repository}}:{{.Tag}}' | grep -E '^(localhost:443/amd64_|hello:1\.0)')
          if [ -n "$images" ]; then
            # shellcheck disable=SC2086
            docker save $images -o /tmp/e2edev-service-images.tar
          fi
      
      - name: Test Failure Catch - Check Docker Images
        continue-on-error: true
        if: ${{ failure() && steps.test-runner.conclusion == 'failure' }}
        run: docker images -a

      - name: Test Failure Catch - Check Docker Containers
        continue-on-error: true
        if: ${{ failure() && steps.test-runner.conclusion == 'failure' }}
        run: docker ps -a
      
      - name: Test Failure Catch - Capture Agent Service Container Logs
        continue-on-error: true
        if: ${{ failure() && steps.test-runner.conclusion == 'failure' }}
        run: |
          docker ps -a --format "{{.ID}}  {{.Image}}  {{.Names}}"
          echo ""
          docker ps -a --format "{{.Names}}" | grep -v -E "^(agbot|css-api|exchange-api|e2edevtest|e2edevregistry|fdo-owner-services|bao|postgres|postgres-fdo-owner-service|mongo)$"
          echo ""
          echo "=== Agent Service Container Logs ==="
          for container in $(docker ps -a --format "{{.Names}}" | grep -v -E "^(agbot|css-api|exchange-api|e2edevtest|e2edevregistry|fdo-owner-services|bao|postgres|postgres-fdo-owner-service|mongo)$"); do
            echo ""
            echo "=========================================="
            echo "Container: $container"
            echo "Status: $(docker inspect --format='{{.State.Status}}' $container 2>/dev/null || echo 'unknown')"
            echo "=========================================="
            docker logs "$container" 2>&1 || echo "Failed to get logs for $container"
            echo ""
          done

      - name: Test Failure Catch - Check Agbot Docker Log
        continue-on-error: true
        if: ${{ failure() && steps.test-runner.conclusion == 'failure' }}
        run: docker logs agbot
      
      - name: Test Failure Catch - Check Cloud Sync Service (CSS) Docker Log
        continue-on-error: true
        if: ${{ failure() && steps.test-runner.conclusion == 'failure' }}
        run: docker logs css-api

      - name: Test Failure Catch - Check Exchange Docker Log
        continue-on-error: true
        if: ${{ failure() && steps.test-runner.conclusion == 'failure' }}
        run: docker logs exchange-api
      
      - name: Test Failure Catch - Check k8s Pods
        continue-on-error: true
        if: ${{ failure() && steps.test-runner.conclusion == 'failure' }}
        run: sudo -E snap run microk8s kubectl get pods -n agent-namespace -o wide

      - name: Test Failure Catch - Check k8s Pods Description
        continue-on-error: true
        if: ${{ failure() && steps.test-runner.conclusion == 'failure' }}
        run: sudo -E snap run microk8s kubectl describe pods -n agent-namespace

      - name: Test Failure Catch - Check k8s Services
        continue-on-error: true
        if: ${{ failure() && steps.test-runner.conclusion == 'failure' }}
        run: sudo -E snap run microk8s kubectl get services -n agent-namespace -o wide

      - name: Test Failure Catch - Check k8s Nodes
        continue-on-error: true
        if: ${{ failure() && steps.test-runner.conclusion == 'failure' }}
        run: sudo -E snap run microk8s kubectl get nodes -n agent-namespace -o wide

      - name: Test Failure Catch - Check k8s Pod Logs
        continue-on-error: true
        if: ${{ failure() && steps.test-runner.conclusion == 'failure' }}
        run: sudo -E snap run microk8s kubectl logs -l app=agent --all-pods=true --all-containers=true -n agent-namespace
