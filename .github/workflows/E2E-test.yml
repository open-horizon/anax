# Name of the workflow
name: E2E-test

# Workflow triggers -- When a pull request is made for the listed branches
on:
  workflow_dispatch:
  pull_request:
    branches:
      - master
      - v2.31
      - v2.30
      - v2.29

# Jobs executed when workflow is triggered
jobs:
  test:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Strategy allows specifying matrix axis(es) that will run for the test
    strategy:
      fail-fast: false
      matrix:
        tests: ["NOLOOP=1", "NOLOOP=1 TEST_PATTERNS=sall"]

    # Variables that are available to all steps in the job
    env:
      GOPATH: /home/runner/work/anax/anax/go
      DOCKER_CONFIG: /home/runner/.docker-config

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
        with:
          path: go/src/github.com/${{github.repository}}
    
      # Prepares the environment by setting up golang
      - name: Set up golang 1.24
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          check-latest: true

      - name: Verify Docker version
        run: docker --version

      # Build anax binaries
      - name: Build anax binaries
        run: cd ${GOPATH}/src/github.com/${GITHUB_REPOSITORY} && make
          
      # Build the e2edev docker images 
      - name: Build the e2edev docker images
        run: cd ${GOPATH}/src/github.com/${GITHUB_REPOSITORY} && make -C test build-remote

      - name: Verify Built Container Images
        run: docker images

      - name: E2E Development Test
        id: test-runner
        run: cd ${GOPATH}/src/github.com/${{ github.repository }} && make -C test test-no-clean TEST_VARS=${{matrix.tests}}
      
      - name: Test Failure Catch - Check Docker Images
        continue-on-error: true
        if: ${{ failure() && steps.test-runner.conclusion == 'failure' }}
        run: docker images -a

      - name: Test Failure Catch - Check Docker Containers
        continue-on-error: true
        if: ${{ failure() && steps.test-runner.conclusion == 'failure' }}
        run: docker ps -a

      - name: Test Failure Catch - Check Agbot Docker Log
        continue-on-error: true
        if: ${{ failure() && steps.test-runner.conclusion == 'failure' }}
        run: docker logs agbot
      
      - name: Test Failure Catch - Check Cloud Sync Service (CSS) Docker Log
        continue-on-error: true
        if: ${{ failure() && steps.test-runner.conclusion == 'failure' }}
        run: docker logs css-api

      - name: Test Failure Catch - Check Exchange Docker Log
        continue-on-error: true
        if: ${{ failure() && steps.test-runner.conclusion == 'failure' }}
        run: docker logs exchange-api
      
      - name: Test Failure Catch - Check Infrastructure Container Logs
        continue-on-error: true
        if: ${{ failure() && steps.test-runner.conclusion == 'failure' }}
        run: |
          echo "=== Infrastructure Container Logs ==="
          for container in e2edevregistry fdo-owner-services bao postgres postgres-fdo-owner-service mongo; do
            if docker ps -a --format "{{.Names}}" | grep -q "^${container}$"; then
              echo ""
              echo "=========================================="
              echo "Container: $container"
              echo "Status: $(docker inspect --format='{{.State.Status}}' $container 2>/dev/null || echo 'unknown')"
              echo "=========================================="
              docker logs $container 2>&1 | tail -100 || echo "Failed to get logs for $container"
              echo ""
            fi
          done

      - name: Test Failure Catch - Capture Agent Service Container Logs
        continue-on-error: true
        if: ${{ failure() && steps.test-runner.conclusion == 'failure' }}
        run: |
          echo "=== Agent Service Container Logs ==="
          for container in $(docker ps -a --format "{{.Names}}" | grep -v -E "^(agbot|css-api|exchange-api|e2edevtest|e2edevregistry|fdo-owner-services|bao|postgres|postgres-fdo-owner-service|mongo)$"); do
            echo ""
            echo "=========================================="
            echo "Container: $container"
            echo "Status: $(docker inspect --format='{{.State.Status}}' $container 2>/dev/null || echo 'unknown')"
            echo "=========================================="
            docker logs $container 2>&1 | tail -100 || echo "Failed to get logs for $container"
            echo ""
          done

      - name: Test Failure Catch - Check k8s Pods
        continue-on-error: true
        if: ${{ failure() && steps.test-runner.conclusion == 'failure' }}
        run: sudo -E snap run microk8s kubectl get pods -n agent-namespace -o wide

      - name: Test Failure Catch - Check k8s Pods Description
        continue-on-error: true
        if: ${{ failure() && steps.test-runner.conclusion == 'failure' }}
        run: sudo -E snap run microk8s kubectl describe pods -n agent-namespace

      - name: Test Failure Catch - Check k8s Services
        continue-on-error: true
        if: ${{ failure() && steps.test-runner.conclusion == 'failure' }}
        run: sudo -E snap run microk8s kubectl get services -n agent-namespace -o wide

      - name: Test Failure Catch - Check k8s Nodes
        continue-on-error: true
        if: ${{ failure() && steps.test-runner.conclusion == 'failure' }}
        run: sudo -E snap run microk8s kubectl get nodes -n agent-namespace -o wide

      - name: Test Failure Catch - Check k8s Pod Logs
        continue-on-error: true
        if: ${{ failure() && steps.test-runner.conclusion == 'failure' }}
        run: sudo -E snap run microk8s kubectl logs -l app=agent --all-pods=true --all-containers=true -n agent-namespace

      - name: Test Failure Catch - Check k8s Events
        continue-on-error: true
        if: ${{ failure() && steps.test-runner.conclusion == 'failure' }}
        run: sudo -E snap run microk8s kubectl get events -n agent-namespace --sort-by='.lastTimestamp'

      - name: Test Failure Catch - Check k8s Deployments
        continue-on-error: true
        if: ${{ failure() && steps.test-runner.conclusion == 'failure' }}
        run: sudo -E snap run microk8s kubectl get deployments -n agent-namespace -o wide

      - name: Test Failure Catch - Check k8s ReplicaSets
        continue-on-error: true
        if: ${{ failure() && steps.test-runner.conclusion == 'failure' }}
        run: sudo -E snap run microk8s kubectl get replicasets -n agent-namespace -o wide

      - name: Test Failure Catch - Check k8s ConfigMaps
        continue-on-error: true
        if: ${{ failure() && steps.test-runner.conclusion == 'failure' }}
        run: sudo -E snap run microk8s kubectl get configmaps -n agent-namespace

      - name: Test Failure Catch - Check k8s Secrets
        continue-on-error: true
        if: ${{ failure() && steps.test-runner.conclusion == 'failure' }}
        run: sudo -E snap run microk8s kubectl get secrets -n agent-namespace

      - name: Test Failure Catch - Check k8s PersistentVolumeClaims
        continue-on-error: true
        if: ${{ failure() && steps.test-runner.conclusion == 'failure' }}
        run: sudo -E snap run microk8s kubectl get pvc -n agent-namespace

      - name: Test Failure Catch - Check k8s Resource Usage
        continue-on-error: true
        if: ${{ failure() && steps.test-runner.conclusion == 'failure' }}
        run: sudo -E snap run microk8s kubectl top pods -n agent-namespace || echo "Metrics server not available"

      - name: Test Failure Catch - Check All k8s Namespaces
        continue-on-error: true
        if: ${{ failure() && steps.test-runner.conclusion == 'failure' }}
        run: sudo -E snap run microk8s kubectl get namespaces

      - name: Test Failure Catch - Print Test Framework Summary Report
        continue-on-error: true
        if: ${{ failure() && steps.test-runner.conclusion == 'failure' }}
        run: |
          echo "=== Test Framework Summary Report ==="
          docker exec e2edevtest bash -c "if [ -f /root/framework/test_results/test_summary.txt ]; then cat /root/framework/test_results/test_summary.txt; else echo 'No test summary report found'; fi"

      - name: Test Failure Catch - Print Test Framework Detailed Report
        continue-on-error: true
        if: ${{ failure() && steps.test-runner.conclusion == 'failure' }}
        run: |
          echo "=== Test Framework Detailed Report ==="
          docker exec e2edevtest bash -c "if [ -f /root/framework/test_results/test_report.txt ]; then cat /root/framework/test_results/test_report.txt; else echo 'No detailed test report found'; fi"

      - name: Test Failure Catch - Print Test Framework XML Report
        continue-on-error: true
        if: ${{ failure() && steps.test-runner.conclusion == 'failure' }}
        run: |
          echo "=== Test Framework XML Report ==="
          docker exec e2edevtest bash -c "if [ -f /root/framework/test_results/test_results.xml ]; then cat /root/framework/test_results/test_results.xml; else echo 'No XML test report found'; fi"

      - name: Test Failure Catch - Print Test Framework JSON Report
        continue-on-error: true
        if: ${{ failure() && steps.test-runner.conclusion == 'failure' }}
        run: |
          echo "=== Test Framework JSON Report ==="
          docker exec e2edevtest bash -c "if [ -f /root/framework/test_results/test_results.json ]; then cat /root/framework/test_results/test_results.json; else echo 'No JSON test report found'; fi"

      - name: Test Failure Catch - List All Test Framework Output Files
        continue-on-error: true
        if: ${{ failure() && steps.test-runner.conclusion == 'failure' }}
        run: |
          echo "=== Test Framework Output Files ==="
          docker exec e2edevtest bash -c "if [ -d /root/framework/test_results ]; then ls -lah /root/framework/test_results/; else echo 'No test results directory found'; fi"

      - name: Test Failure Catch - Print Passed Test Logs
        continue-on-error: true
        if: ${{ failure() && steps.test-runner.conclusion == 'failure' }}
        run: |
          echo "=== Passed Test Logs ==="
          docker exec e2edevtest bash -c "if [ -d /root/framework/test_results ]; then for log in /root/framework/test_results/*.log; do if [ -f \"\$log\" ]; then test_name=\$(basename \"\$log\" .log); if [ ! -f \"/root/framework/test_results/failure_\${test_name}.txt\" ]; then echo \"--- \$(basename \$log) ---\"; cat \"\$log\"; echo \"\"; fi; fi; done; else echo 'No test log files found'; fi"

      - name: Test Failure Catch - Print Failed Test Logs
        continue-on-error: true
        if: ${{ failure() && steps.test-runner.conclusion == 'failure' }}
        run: |
          echo "=== Failed Test Logs ==="
          docker exec e2edevtest bash -c "if [ -d /root/framework/test_results ]; then for log in /root/framework/test_results/*.log; do if [ -f \"\$log\" ]; then test_name=\$(basename \"\$log\" .log); if [ -f \"/root/framework/test_results/failure_\${test_name}.txt\" ]; then echo \"--- \$(basename \$log) ---\"; cat \"\$log\"; echo \"\"; fi; fi; done; else echo 'No test log files found'; fi"

      - name: Test Failure Catch - Print Test Failure Reports
        continue-on-error: true
        if: ${{ failure() && steps.test-runner.conclusion == 'failure' }}
        run: |
          echo "=== Test Failure Reports ==="
          docker exec e2edevtest bash -c "if [ -d /root/framework/test_results ]; then for report in /root/framework/test_results/failure_*.txt; do if [ -f \"\$report\" ]; then echo \"========================================\"; echo \"Report: \$(basename \$report)\"; echo \"========================================\"; cat \"\$report\"; echo \"\"; echo \"\"; fi; done; else echo 'No failure reports found'; fi"
